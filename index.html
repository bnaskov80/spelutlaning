<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Spelutlåning</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="offline-banner">⚠️ Ingen internetanslutning – ändringar sparas inte</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>🎲 Spelutlåning</h1>
      <p>Hantera lån enkelt</p>
    </div>
    <nav>
      <button class="nav-btn active" id="nav-scan"    onclick="navigate('scan',    this)"><span class="nav-icon">🏫</span> Låna / Lämna</button>
      <button class="nav-btn"         id="nav-active"  onclick="navigate('active',  this)"><span class="nav-icon">📋</span> Aktiva lån</button>
      <button class="nav-btn" id="nav-library" onclick="toggleLibrary(this)">
        <span class="nav-icon">📚</span> Bibliotek
        <span id="library-arrow" style="margin-left:auto;font-size:12px;transition:transform 0.2s">▶</span>
      </button>
      <div id="library-sub" style="display:none;flex-direction:column;gap:2px;padding-left:12px">
        <button class="nav-btn" id="nav-games"  onclick="navigate('games',  this)"><span class="nav-icon">🎮</span> Spel</button>
        <button class="nav-btn" id="nav-pyssel" onclick="navigate('pyssel', this)"><span class="nav-icon">✂️</span> Pyssel-kit</button>
        <button class="nav-btn" id="nav-cards"  onclick="navigate('cards',  this)"><span class="nav-icon">👤</span> Lånekort</button>
      </div>
      <button class="nav-btn admin-btn" id="nav-admin" onclick="promptAdmin(this)"><span class="nav-icon">🔐</span> Admin</button>
    </nav>
    <div class="sidebar-footer">Spelbibliotek v2.3</div>
  </aside>

  <div class="content">
    <header class="topbar">
      <button id="menuToggle" onclick="toggleSidebar()" aria-label="Öppna meny">☰</button>
      <span class="topbar-title" id="topbarTitle">Spelutlåning</span>
      <div class="online-dot" id="onlineDot" title="Ansluten"></div>
    </header>
    <main id="view">
      <div class="welcome">
        <div class="welcome-icon">🎲</div>
        <h2>Välkommen!</h2>
        <p>Välj en klass för att börja låna</p>
        <button class="welcome-btn" onclick="navigate('scan', document.getElementById('nav-scan'))">🏫 Välj klass</button>
      </div>
    </main>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/features.js"></script>
<script src="js/stats.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>

</body>
</html>
